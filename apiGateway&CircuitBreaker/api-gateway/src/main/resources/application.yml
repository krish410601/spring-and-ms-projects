server:
  port: 8761
 
spring:
  application:
    name: api-gateway
 
  cloud:
    gateway:
      routes:
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/doctor-service/**
 
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/patient-service/**
 
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointment-service/**
 
eureka:
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
 